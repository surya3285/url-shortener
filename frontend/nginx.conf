server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API calls -> Flask backend.
    location /api/ {
        proxy_pass http://api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        proxy_pass http://api:5000/health;
    }

    # Short-code redirects (base62, 5-12 chars) -> Flask backend.
    # Regex locations take precedence over the SPA fallback below, and
    # will not match static asset paths (which contain "/" or ".").
    location ~ "^/[A-Za-z0-9]{5,12}$" {
        proxy_pass http://api:5000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Everything else: serve the SPA.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
